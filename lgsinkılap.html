<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LGS İNKILAP // DÜELLO</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Space+Grotesk:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --p1-color: #00f2ff; --p2-color: #bc13fe;
            --bg: #05010a; --correct: #00ff88; --wrong: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: 'Space Grotesk', sans-serif; height: 100vh; overflow: hidden; }

        #setup {
            position: fixed; inset: 0; background: var(--bg); z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        input { 
            width: 85%; padding: 15px; margin: 10px; background: rgba(255,255,255,0.05); 
            border: 1px solid var(--p1-color); color: #fff; border-radius: 10px; text-align: center;
        }
        #start-btn { 
            background: var(--p1-color); color: #000; border: none; padding: 15px 50px; 
            border-radius: 30px; font-family: 'Orbitron'; font-weight: bold; margin-top: 20px;
        }

        .game-container { display: flex; flex-direction: column; height: 100vh; }
        
        .player-zone { 
            flex: 1; display: flex; flex-direction: column; justify-content: center; 
            padding: 15px; position: relative; border: 1px solid rgba(255,255,255,0.1);
        }

        .p1-zone { transform: rotate(180deg); border-bottom: 2px solid var(--p1-color); }
        .p2-zone { border-top: 2px solid var(--p2-color); }

        .stats { display: flex; justify-content: space-between; font-family: 'Orbitron'; font-size: 0.7rem; margin-bottom: 5px; }
        .q-text { font-size: 0.85rem; line-height: 1.3; margin-bottom: 10px; text-align: justify; color: #ddd; }
        .q-bold { color: #fff; font-weight: bold; display: block; margin-top: 5px; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .mobile-opt { 
            background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15);
            color: #fff; padding: 10px 5px; border-radius: 6px; font-size: 0.75rem; text-align: center;
            display: flex; align-items: center; justify-content: center; min-height: 45px;
        }

        .correct { background: var(--correct) !important; color: #000 !important; font-weight: bold; }
        .wrong { background: var(--wrong) !important; }

        .timer-line { position: absolute; bottom: 0; left: 0; height: 4px; background: #00f2ff; width: 100%; transition: linear 1s; }

        #result { 
            position: fixed; inset: 0; background: var(--bg); z-index: 200; display: none;
            flex-direction: column; align-items: center; justify-content: center; text-align: center;
        }
    </style>
</head>
<body>

    <div id="setup">
        <h2 style="font-family: 'Orbitron'; color: var(--p1-color); margin-bottom: 10px;">LGS ANALİZ DÜELLOSU</h2>
        <p style="font-size: 0.8rem; color: #888; margin-bottom: 20px;">Yeni Nesil Sorularla Tarih Yarışı</p>
        <input type="text" id="p1-in" placeholder="1. Oyuncu Adı">
        <input type="text" id="p2-in" placeholder="2. Oyuncu Adı">
        <button id="start-btn" onclick="initGame()">SİSTEMİ BAŞLAT</button>
    </div>

    <div class="game-container">
        <div class="player-zone p1-zone" id="p1-area">
            <div class="stats"><span id="p1-name-tag">P1</span> <span id="p1-score">0</span></div>
            <div class="q-text" id="q1-text">Yükleniyor...</div>
            <div class="btn-grid" id="p1-btns"></div>
            <div class="timer-line" id="t1"></div>
        </div>

        <div class="player-zone p2-zone" id="p2-area">
            <div class="stats"><span id="p2-name-tag">P2</span> <span id="p2-score">0</span></div>
            <div class="q-text" id="q2-text">Yükleniyor...</div>
            <div class="btn-grid" id="p2-btns"></div>
            <div class="timer-line" id="t2"></div>
        </div>
    </div>

    <div id="result">
        <h1 id="win-msg" style="font-family: 'Orbitron';"></h1>
        <p id="final-scores" style="margin: 20px;"></p>
        <button id="start-btn" onclick="location.reload()">TEKRAR BAŞLAT</button>
    </div>

    <script>
        const questions = [
            { 
                q: "Mustafa Kemal, Şam'da Vatan ve Hürriyet Cemiyeti'ni kurmuş; Trablusgarp'ta halkı İtalyanlara karşı örgütlemiştir. <span class='q-bold'>Bu durum onun hangi kişilik özelliğini doğrudan kanıtlar?</span>", 
                a: ["İleri Görüşlülük", "Teşkilatçılık", "Eğitimcilik", "Açık Sözlülük"], 
                c: 1 
            },
            { 
                q: "Amasya Genelgesi'nde 'Milletin bağımsızlığını yine milletin azim ve kararı kurtaracaktır' maddesi yer almıştır. <span class='q-bold'>Bu madde Milli Mücadele'nin hangi özelliğini vurgular?</span>", 
                a: ["Gerekçesini", "Yöntemini", "Dış Yardımı", "Maddi Kaynağı"], 
                c: 1 
            },
            { 
                q: "Erzurum Kongresi'nde alınan 'Manda ve himaye kabul edilemez' kararı, aşağıdakilerden hangisinden ödün verilmeyeceğini gösterir? <span class='q-bold'>Odak nokta hangisidir?</span>", 
                a: ["Batılılaşma", "Tam Bağımsızlık", "Milli Egemenlik", "Laiklik"], 
                c: 1 
            },
            { 
                q: "Sakarya Meydan Muharebesi öncesi yayınlanan Tekalif-i Milliye Emirleri ile halktan ordu için yardım istenmiştir. <span class='q-bold'>Bu durum aşağıdakilerden hangisinin bir göstergesidir?</span>", 
                a: ["Topyekun Seferberlik", "Ekonomik Bolluk", "Düzenli Ordunun İptali", "Saltanat Desteği"], 
                c: 0 
            },
            { 
                q: "Lozan Antlaşması'nda kapitülasyonların kesin olarak kaldırılması, Türk devletine en çok hangi alanda kazanım sağlamıştır? <span class='q-bold'>Stratejik hedef nedir?</span>", 
                a: ["Askeri Güç", "Ekonomik Bağımsızlık", "Dini Özgürlük", "Eğitimde Birlik"], 
                c: 1 
            },
            { 
                q: "Atatürk 'Hayatta en hakiki mürşit ilimdir' diyerek devlet yönetiminde ve toplumsal hayatta aşağıdakilerden hangisini esas almıştır? <span class='q-bold'>Temel prensip nedir?</span>", 
                a: ["Gelenekçilik", "Akılcılık ve Bilim", "Siyasi Çıkar", "Kişisel Otorite"], 
                c: 1 
            },
            { 
                q: "Medeni Kanun ile kadınlara ekonomik ve sosyal haklar verilmiş ancak siyasi haklar verilmemiştir. <span class='q-bold'>Buna göre kadınlar hangisini bu kanunla kazanamamıştır?</span>", 
                a: ["Miras Hakkı", "Boşanma Hakkı", "Milletvekili Seçilme", "Şahitlik Hakları"], 
                c: 2 
            }
        ];

        let cur = 0, s1 = 0, s2 = 0, canHit = false, timer;

        function initGame() {
            const p1 = document.getElementById('p1-in').value || "OYUNCU 1";
            const p2 = document.getElementById('p2-in').value || "OYUNCU 2";
            document.getElementById('p1-name-tag').innerText = p1;
            document.getElementById('p2-name-tag').innerText = p2;
            document.getElementById('setup').style.display = 'none';
            render();
        }

        function render() {
            if(cur >= questions.length) return finish();
            canHit = true;
            const q = questions[cur];
            
            document.getElementById('q1-text').innerHTML = q.q;
            document.getElementById('q2-text').innerHTML = q.q;
            
            [1, 2].forEach(pNum => {
                const box = document.getElementById(`p${pNum}-btns`);
                box.innerHTML = '';
                q.a.forEach((opt, i) => {
                    const b = document.createElement('div');
                    b.className = 'mobile-opt';
                    b.innerText = opt;
                    b.onclick = () => check(pNum, i);
                    box.appendChild(b);
                });
            });
            startTimer();
        }

        function startTimer() {
            let sec = 15; // Yeni nesil sorular için süreyi 15 saniye yaptım
            clearInterval(timer);
            timer = setInterval(() => {
                sec--;
                const w = (sec/15)*100 + "%";
                document.getElementById('t1').style.width = w;
                document.getElementById('t2').style.width = w;
                if(sec <= 0) { next(); }
            }, 1000);
        }

        function check(p, idx) {
            if(!canHit) return;
            canHit = false;
            clearInterval(timer);
            const correct = questions[cur].c;
            
            if(idx === correct) {
                document.getElementById(`p1-btns`).children[idx].classList.add('correct');
                document.getElementById(`p2-btns`).children[idx].classList.add('correct');
                if(p === 1) s1 += 10; else s2 += 10;
            } else {
                document.getElementById(`p${p}-btns`).children[idx].classList.add('wrong');
                document.getElementById(`p1-btns`).children[correct].classList.add('correct');
                document.getElementById(`p2-btns`).children[correct].classList.add('correct');
            }
            
            document.getElementById('p1-score').innerText = s1;
            document.getElementById('p2-score').innerText = s2;
            setTimeout(next, 2000);
        }

        function next() {
            cur++;
            render();
        }

        function finish() {
            document.getElementById('result').style.display = 'flex';
            const winner = s1 > s2 ? document.getElementById('p1-name-tag').innerText : (s2 > s1 ? document.getElementById('p2-name-tag').innerText : "BERABERE");
            document.getElementById('win-msg').innerText = "KAZANAN: " + winner;
            document.getElementById('final-scores').innerText = `SKOR: ${s1} - ${s2}`;
        }
    </script>
</body>
</html>
